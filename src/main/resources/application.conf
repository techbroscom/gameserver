ktor {
    deployment {
        port = 8081
        port = ${?SERVER_PORT}
    }
    application {
        modules = [ com.mygame.backend.ApplicationKt.module ]
    }
}

storage {
    driverClassName = "org.postgresql.Driver"
    jdbcURL = "jdbc:postgresql://localhost:5432/gameserver"
    jdbcURL = ${?DATABASE_URL}
    user = "gameserver_user"
    user = ${?DATABASE_USER}
    password = "gameserver_pass"
    password = ${?DATABASE_PASSWORD}
}

redis {
    uri = "redis://localhost:6379"
    uri = ${?REDIS_URL}
}

jwt {
    secret = "secret"
    secret = ${?JWT_SECRET}
    issuer = "http://0.0.0.0:8081/"
    issuer = ${?JWT_ISSUER}
    audience = "http://0.0.0.0:8081/hello"
    audience = ${?JWT_AUDIENCE}
    realm = "Access to 'hello'"
}

game {
    tickRateMs = 50
    tickRateMs = ${?GAME_TICK_RATE_MS}
    maxPlayersPerRoom = 16
    maxPlayersPerRoom = ${?MAX_PLAYERS_PER_ROOM}
    bingoCallIntervalMs = 5000
    bingoCallIntervalMs = ${?BINGO_CALL_INTERVAL_MS}
}
